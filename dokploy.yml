app_name: app              # Nombre de tu aplicación
app_dir: ./                   # Carpeta raíz donde está package.json
build:
  image: node:20.11  # <- Cambia la versión a 20 o superior
  commands:
    - pnpm install
    - pnpm build
deploy:
  command: "pnpm start"        # Comando para iniciar la app
domain:
  - codeinnova.es
  - www.codeinnova.es